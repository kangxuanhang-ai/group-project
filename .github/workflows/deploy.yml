name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts=false

      - name: Build frontend
        run: pnpm --filter @en/web build

      - name: Build server
        run: pnpm --filter @en/server build

      - name: Generate Prisma Client
        working-directory: server
        run: npx prisma generate
        env:
          DATABASE_URL: "mysql://root:password@localhost:3306/placeholder_db"

      - name: Prepare deploy artifacts
        run: |
          mkdir -p deploy/apps/web \
                   deploy/packages/common \
                   deploy/packages/config \
                   deploy/server/prisma \
                   deploy/server/libs/shared

          cp -r apps/web/dist deploy/apps/web/
          cp -r server/dist deploy/server/
          cp -r server/prisma/* deploy/server/prisma/
          cp server/package.json deploy/server/
          cp -r packages/common/* deploy/packages/common/
          cp -r packages/config/* deploy/packages/config/
          cp -r server/libs/shared/* deploy/server/libs/shared/
          cp package.json deploy/
          cp pnpm-workspace.yaml deploy/
          cp pnpm-lock.yaml deploy/
          cp .npmrc deploy/

      - name: Sync to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: deploy/*
          target: /opt/english-app
          strip_components: 1

      - name: Remote deploy
        run: |
          ssh -o StrictHostKeyChecking=no \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            set -e
            cd /opt/english-app

            npm install --production

            cd server
            npx prisma migrate deploy
            cd ..

            pm2 describe english-app > /dev/null 2>&1 \
              && pm2 restart english-app \
              || pm2 start server/dist/apps/server/apps/server/src/main.js --name english-app

            pm2 save
          EOF