name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --ignore-scripts=false

      - name: Build frontend
        run: pnpm --filter @en/web build

      - name: Build server
        run: pnpm --filter @en/server build

      - name: Generate Prisma Client
        working-directory: server
        run: npx prisma generate
        env:
          DATABASE_URL: "mysql://root:password@localhost:3306/placeholder_db"

      - name: Prepare deploy artifacts
        run: |
          mkdir -p deploy/apps/web \
                   deploy/packages/common \
                   deploy/packages/config \
                   deploy/server/prisma \
                   deploy/server/libs/shared

          cp -r apps/web/dist deploy/apps/web/
          cp -r server/dist deploy/server/
          cp -r server/prisma/* deploy/server/prisma/
          cp server/package.json deploy/server/
          cp -r packages/common/* deploy/packages/common/
          cp -r packages/config/* deploy/packages/config/
          cp -r server/libs/shared/* deploy/server/libs/shared/
          cp package.json deploy/
          cp pnpm-workspace.yaml deploy/
          cp pnpm-lock.yaml deploy/
          # 如果项目中存在 .npmrc 则一并拷贝
          if [ -f .npmrc ]; then cp .npmrc deploy/; fi

      - name: Sync to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: deploy/*
          target: /opt/english-app
          strip_components: 1

      - name: Remote deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            #!/bin/bash
            set -e
            cd /opt/english-app

            # --- 核心修复：彻底关闭服务器端 pnpm 的安全拦截，允许 Prisma 正常构建 ---
            pnpm config set ignore-scripts false

            # --- 关键：必须使用 pnpm 安装，以正确识别 Monorepo 工作区结构 ---
            pnpm install --prod --frozen-lockfile

            # --- 数据库迁移 ---
            cd server
            npx prisma migrate deploy
            cd ..

            # --- 启动或重启服务 ---
            pm2 describe english-app > /dev/null 2>&1 \
              && pm2 restart english-app \
              || pm2 start server/dist/apps/server/apps/server/src/main.js --name english-app

            # --- 保存当前 PM2 进程列表，开机自启 ---
            pm2 save