name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @en/web build

      - name: Build server
        run: pnpm --filter @en/server build

      - name: Generate Prisma Client
        working-directory: server
        run: npx prisma generate

      - name: Prepare deploy artifacts
        run: |
          mkdir -p deploy/apps/web \
                   deploy/packages/common \
                   deploy/packages/config \
                   deploy/server/prisma \
                   deploy/server/libs/shared/src

          # 前端构建产物
          cp -r apps/web/dist deploy/apps/web/

          # 后端编译产物
          cp -r server/dist deploy/server/

          # Prisma schema + migrations（用于 migrate deploy）
          cp -r server/prisma/* deploy/server/prisma/

          # workspace 共享包（运行时必须）
          cp -r packages/common/{package.json,index.ts,user,word} deploy/packages/common/
          cp -r packages/config/{package.json,index.ts} deploy/packages/config/

          # libs/shared（PrismaService、ResponseService、拦截器等）
          cp -r server/libs/shared/src/* deploy/server/libs/shared/src/
          cp server/libs/shared/package.json deploy/server/libs/shared/

          # 根级 pnpm 配置
          cp package.json deploy/
          cp pnpm-workspace.yaml deploy/
          cp pnpm-lock.yaml deploy/

          # server 配置
          cp server/package.json deploy/server/

      - name: Sync to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: deploy/*
          target: /opt/english-app
          strip_components: 1

      - name: Remote deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /opt/english-app

            # 安装生产依赖（pnpm 会自动解析 workspace 包）
            pnpm install --prod --frozen-lockfile

            # 数据库迁移
            cd server
            npx prisma migrate deploy
            cd ..

            # 启动 / 重启服务
            pm2 describe english-app > /dev/null 2>&1 \
              && pm2 restart english-app \
              || pm2 start server/dist/apps/server/apps/server/src/main.js \
                 --name english-app \
                 -- -b 0.0.0.0

            pm2 save
